<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>proFit Analyzer | Premium Finance Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(99, 102, 241, 0.2);
            --bg-body: radial-gradient(at 0% 0%, #e0e7ff 0%, transparent 50%), 
                       radial-gradient(at 100% 100%, #e0f2fe 0%, transparent 50%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-input: #1e293b;
            --input-bg: rgba(255, 255, 255, 0.6);
            --radius-xl: 24px;
            --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-body: radial-gradient(at 0% 0%, #0f172a 0%, transparent 50%), 
                       radial-gradient(at 100% 100%, #1e1b4b 0%, transparent 50%);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --text-input: #ffffff !important;
            --input-bg: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg-body);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        .navbar {
            padding: 15px 8%;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            background: var(--glass);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .btn-upgrade {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; padding: 10px 22px; border-radius: 100px;
            font-size: 0.75rem; font-weight: 800; border: none; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .container { max-width: 500px; margin: 40px auto; padding: 0 20px; }

        .glass-card {
            background: var(--glass); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 40px;
            padding: 45px; box-shadow: var(--shadow-premium);
            position: relative;
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quota-badge {
            background: var(--primary); color: white;
            padding: 8px 18px; border-radius: 100px;
            font-size: 0.7rem; font-weight: 800;
            position: absolute; top: -15px; right: 40px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            z-index: 10;
        }

        .card-title {
            font-size: 1.9rem; font-weight: 800; margin-bottom: 35px;
            letter-spacing: -0.8px;
        }
        .card-title span { background: linear-gradient(to right, var(--primary), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-box { margin-bottom: 20px; }
        .input-box label { 
            display: block; font-size: 0.7rem; font-weight: 800; 
            color: var(--text-muted); text-transform: uppercase; 
            margin-bottom: 8px; margin-left: 12px; letter-spacing: 1px;
        }
        
        input {
            width: 100%; padding: 18px;
            border-radius: var(--radius-xl); 
            border: 2px solid transparent;
            background: var(--input-bg);
            font-size: 1.1rem; font-weight: 700; color: var(--text-input);
            transition: 0.3s; outline: none;
        }
        input:focus { border-color: var(--primary); background: white; }
        [data-theme="dark"] input:focus { background: #1e293b; }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 65px;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-calc {
            width: 100%; padding: 20px; border-radius: var(--radius-xl); border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; font-weight: 800; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 1.1rem; transition: 0.3s;
        }

        .btn-reset {
            background: var(--glass-border);
            color: var(--text-main);
            border: none;
            border-radius: var(--radius-xl);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: var(--accent);
            color: white;
        }

        #results-area { display: none; margin-top: 35px; border-top: 2px dashed var(--glass-border); padding-top: 30px; }
        
        .hero-profit { 
            padding: 30px; border-radius: 30px; text-align: center; 
            margin-bottom: 15px; color: white; position: relative; overflow: hidden;
        }
        #res-advice { position: relative; z-index: 1; margin-top: 15px; font-size: 0.9rem; font-weight: 700; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 15px; }

        .detail-card {
            background: var(--glass); border-radius: 25px; padding: 20px;
            border: 1px solid var(--glass-border); margin-top: 15px;
        }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; }
        .detail-row span:first-child { color: var(--text-muted); font-weight: 600; }
        .detail-row span:last-child { font-weight: 800; color: var(--text-main); }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); 
            z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; 
        }
        .modal { 
            background: var(--glass); padding: 40px; border-radius: 40px; 
            text-align: center; max-width: 400px; width: 100%; border: 1px solid var(--glass-border);
        }
        .pricing-box {
            margin: 20px 0 0; padding: 15px; background: rgba(255, 255, 255, 0.05);
            border-radius: 20px 20px 0 0; border-bottom: 1px solid var(--glass-border);
        }
        .qris-container { background: white; padding: 15px; border-radius: 0 0 25px 25px; margin-bottom: 25px; }

        #theme-icon { transition: 0.3s; }

    </style>
</head>
<body data-theme="dark">

    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <i data-lucide="bar-chart-3" style="color:var(--primary);"></i>
            <span style="font-weight:900; color:var(--primary); font-size:1.3rem;">proFit <span style="color:var(--text-main); font-weight:400;">Analyzer</span></span>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <button id="nav-upgrade-btn" class="btn-upgrade" onclick="openPayment()">Upgrade PRO</button>
            <button onclick="toggleTheme()" style="background:var(--glass-border); border:none; padding:10px; border-radius:15px; cursor:pointer; color:var(--text-main);">
                <i data-lucide="sun" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="glass-card">
            <div class="quota-badge" id="quota-badge">KUOTA: 3x</div>
            <h2 class="card-title">Analisis <span>Keuntungan</span></h2>
            
            <div class="input-box">
                <label>Harga Modal / Unit</label>
                <input type="text" id="modal" placeholder="Rp 0" oninput="formatIDR(this)" autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>
            <div class="input-box">
                <label>Harga Jual / Unit</label>
                <input type="text" id="jual" placeholder="Rp 0" oninput="formatIDR(this)" autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>
            <div class="input-box">
                <label>Biaya Ops / Iklan (Total)</label>
                <input type="text" id="ops" placeholder="Rp 0" oninput="formatIDR(this)" autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>
            <div class="input-box">
                <label>Volume Penjualan (Qty)</label>
                <input type="text" id="qty" placeholder="0" oninput="this.value = this.value.replace(/\D/g, '')" autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>

            <div class="btn-group">
                <button class="btn-calc" onclick="calculatePro()">
                    <i data-lucide="zap"></i> Analisis Sekarang
                </button>
                <button class="btn-reset" onclick="resetFields()" title="Hapus Semua">
                    <i data-lucide="refresh-cw"></i>
                </button>
            </div>

            <div id="results-area" class="animate__animated">
                <div class="hero-profit" id="profit-card">
                    <p style="font-size: 0.7rem; font-weight: 800; opacity: 0.8; text-transform: uppercase;">Estimasi Profit Bersih</p>
                    <p id="res-profit" style="font-size: 2.2rem; font-weight: 900;">Rp 0</p>
                    <div id="res-advice"></div>
                </div>

                <div class="detail-card">
                    <div class="detail-row">
                        <span>Total Omzet</span>
                        <span id="res-omzet">Rp 0</span>
                    </div>
                    <div class="detail-row">
                        <span>Beban Modal (COGS)</span>
                        <span id="res-cogs">Rp 0</span>
                    </div>
                    <div class="detail-row">
                        <span>Biaya Operasional</span>
                        <span id="res-total-ops">Rp 0</span>
                    </div>
                    <hr style="border:none; border-top: 1px dashed var(--glass-border); margin:10px 0;">
                    <div class="detail-row">
                        <span style="color:var(--primary) !important;">Margin Keuntungan</span>
                        <span id="res-margin" style="font-size:1.1rem;">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="payment-modal">
        <div class="modal animate__animated animate__zoomIn">
            <i data-lucide="crown" style="color:#f59e0b; width:40px; height:40px; margin-bottom:15px;"></i>
            <h2 style="font-weight:800; font-size:1.6rem;">Buka Fitur <span style="color:#f59e0b">PRO</span></h2>
            <p style="font-size:0.85rem; opacity:0.7;">Hapus limit harian dan nikmati analisis mendalam.</p>
            
            <div class="pricing-box">
                <p style="font-size:0.7rem; font-weight:800; color:var(--text-muted); letter-spacing:1px;">BIAYA LANGGANAN</p>
                <h4 style="font-size:1.5rem; font-weight:900;">Rp 30.000 <span style="font-size:0.8rem; font-weight:400; opacity:0.6;">/ BULAN</span></h4>
            </div>

            <div class="qris-container">
                <img src="QRIS.jpg" style="width:100%; border-radius:15px;" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=UpgradePro'">
            </div>

            <button class="btn-calc" onclick="sendWA()" style="background:#25d366; margin-bottom:20px;">
                <i data-lucide="message-circle"></i> Konfirmasi WhatsApp
            </button>
            <p onclick="closePayment()" style="cursor:pointer; font-size:0.85rem; color:var(--text-muted); font-weight:700;">Nanti Saja</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const STORAGE_KEY = "profit_analyzer_pro_status";
        const PRO_DURATION_DAYS = 30;

        function getDynamicCode() {
            const d = new Date();
            const month = d.getMonth();
            const secretCodes = [
                "pf_1aB2c", "pf_4eF5g", "pf_7xR9z", "pf_2wK4m", 
                "pf_9pQ1s", "pf_5tB8v", "pf_3nX6c", "pf_8mZ2y", 
                "pf_4kL7w", "pf_1jR9x", "pf_6vM3q", "pf_9dG5f"
            ];
            return secretCodes[month];
        }

        const urlParams = new URLSearchParams(window.location.search);
        const activationCode = urlParams.get('status');
        if (activationCode === getDynamicCode()) {
            const expiryDate = new Date();
            expiryDate.setDate(expiryDate.getDate() + PRO_DURATION_DAYS);
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ isPro: true, expiry: expiryDate.getTime() }));
            window.history.replaceState({}, document.title, window.location.pathname);
            alert("🎉 PRO AKTIF! Fitur premium terbuka 30 hari.");
            location.reload();
        }

        function checkProStatus() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (!data) return { isPro: false };
            if (new Date().getTime() > data.expiry) {
                localStorage.removeItem(STORAGE_KEY);
                return { isPro: false };
            }
            return data;
        }

        let userStatus = checkProStatus();
        let quota = userStatus.isPro ? Infinity : 3;

        function updateUI() {
            const badge = document.getElementById('quota-badge');
            const upgradeBtn = document.getElementById('nav-upgrade-btn');
            if (userStatus.isPro) {
                const days = Math.ceil((userStatus.expiry - new Date().getTime()) / (86400000));
                badge.innerText = `PRO: ${days} HARI ✨`;
                badge.style.background = "linear-gradient(135deg, #f59e0b, #d97706)";
                upgradeBtn.innerText = "PRO ACTIVE";
                upgradeBtn.style.opacity = "0.6";
                upgradeBtn.onclick = null;
            } else {
                badge.innerText = `KUOTA: ${quota}x`;
            }
        }
        updateUI();

        function formatIDR(i) {
            let v = i.value.replace(/\D/g, "");
            i.value = v ? new Intl.NumberFormat('id-ID').format(v) : "";
        }

        function getNum(id) { return parseFloat(document.getElementById(id).value.replace(/\./g, "")) || 0; }

        function calculatePro() {
            if (!userStatus.isPro && quota <= 0) { openPayment(); return; }
            
            const m = getNum('modal'), j = getNum('jual'), o = getNum('ops'), q = getNum('qty');
            if (m === 0 || j === 0 || q === 0) return alert("Isi Modal, Jual, dan Qty!");

            const omzet = j * q;
            const cogs = m * q;
            const profit = omzet - cogs - o;
            const margin = (profit / omzet) * 100;

            const fmt = (n) => "Rp " + new Intl.NumberFormat('id-ID').format(n);
            
            document.getElementById('results-area').style.display = 'block';
            document.getElementById('res-profit').innerText = fmt(profit);
            document.getElementById('res-omzet').innerText = fmt(omzet);
            document.getElementById('res-cogs').innerText = fmt(cogs);
            document.getElementById('res-total-ops').innerText = fmt(o);
            document.getElementById('res-margin').innerText = margin.toFixed(1) + "%";
            document.getElementById('res-margin').style.color = profit < 0 ? "#f43f5e" : "#10b981";

            const card = document.getElementById('profit-card');
            const adv = document.getElementById('res-advice');
            if (profit < 0) {
                card.style.background = "linear-gradient(135deg, #f43f5e, #e11d48)";
                adv.innerHTML = "⚠️ <b>RUGI!</b> Periksa kembali biaya operasional.";
            } else {
                card.style.background = "linear-gradient(135deg, #10b981, #059669)";
                adv.innerHTML = "🚀 <b>PROFIT!</b> Bisnis Anda berjalan sehat.";
            }

            if (!userStatus.isPro) { quota--; updateUI(); }
        }

        function resetFields() {
            const inputs = ['modal', 'jual', 'ops'];
            inputs.forEach(id => document.getElementById(id).value = "");
            document.getElementById('qty').value = "0";
            document.getElementById('results-area').style.display = 'none';
            lucide.createIcons();
        }

        function toggleTheme() {
            const b = document.body;
            const t = b.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            b.setAttribute('data-theme', t);
            document.getElementById('theme-icon').setAttribute('data-lucide', t === 'light' ? 'moon' : 'sun');
            lucide.createIcons();
        }

        function openPayment() { document.getElementById('payment-modal').style.display = 'flex'; }
        function closePayment() { document.getElementById('payment-modal').style.display = 'none'; }
        function sendWA() { window.open("https://wa.me/6289636503978?text=Halo,%20saya%20sudah%20transfer%20Rp30.000%20untuk%20proFit%20PRO."); }
    </script>
</body>
</html>
